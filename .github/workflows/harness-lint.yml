name: Harness Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shell-lint:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Shell syntax check
        run: |
          status=0
          for f in scripts/*.sh install.sh uninstall.sh bin/praxis-preflight.sh base/hooks/*.sh; do
            [ -f "$f" ] || continue
            if bash -n "$f"; then
              echo "✓ $f"
            else
              echo "✗ $f"
              status=1
            fi
          done
          exit $status

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck -s bash scripts/*.sh install.sh uninstall.sh bin/praxis-preflight.sh base/hooks/*.sh

  js-check:
    name: JS syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Node syntax check
        run: node --check bin/praxis.js

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            docs/**/*.md
            base/skills/**/*.md
            base/commands/**/*.md
            kits/**/*.md
            templates/**/*.md

  harness-lint:
    name: Harness lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run harness lint
        run: bash scripts/lint-harness.sh .
